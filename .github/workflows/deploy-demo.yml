name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout KeyInSight
        uses: actions/checkout@v4
        with:
          path: KeyInSight

      # The workspace Cargo.toml patches agg-gui to ../agg-gui/agg-gui (see
      # docs/architecture.md), so CI needs the sibling layout to resolve
      # the patch.
      - name: Checkout sibling agg-gui
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/agg-gui
          path: agg-gui

      - name: Checkout sibling verovio-rust
        uses: actions/checkout@v4
        with:
          repository: larsbrubaker/verovio-rust
          path: verovio-rust

      - name: Install Rust (stable + wasm32 target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            KeyInSight/target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('KeyInSight/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install demo dependencies
        working-directory: KeyInSight/demo
        run: bun install

      - name: Build WASM
        working-directory: KeyInSight
        run: |
          wasm-pack build keyinsight-wasm \
            --target web \
            --out-dir ../demo/public/pkg \
            --no-typescript

      - name: Bundle TypeScript
        working-directory: KeyInSight/demo
        run: bun run build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: KeyInSight/demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
